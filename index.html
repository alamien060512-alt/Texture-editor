<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MC Bedrock Texture Editor</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1a1f;--bg2:#222228;--bg3:#2a2a32;--bg4:#32323c;
  --border:#3a3a48;--border2:#4a4a5a;
  --text:#e8e8f0;--text2:#a0a0b8;--text3:#6060788;
  --green:#4ade80;--green2:#166534;
  --blue:#60a5fa;--blue2:#1e40af;
  --red:#f87171;--accent:#7c3aed;--accent2:#a78bfa;
  --canvas-bg:#111118;
}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;font-size:13px}

/* TOP BAR */
#topbar{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
#topbar h1{font-size:15px;font-weight:700;color:var(--accent2);white-space:nowrap;letter-spacing:.5px}
#topbar h1 span{color:var(--text2);font-weight:400;font-size:12px;margin-left:6px}
.topbtn{padding:5px 11px;border-radius:5px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;font-size:12px;transition:all .15s;white-space:nowrap}
.topbtn:hover{background:var(--bg4);border-color:var(--accent2)}
.topbtn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.topbtn.primary:hover{background:#6d28d9}
.topbtn.success{background:#166534;border-color:var(--green2);color:var(--green)}
.topbtn.success:hover{background:#15803d}
#topbar-spacer{flex:1}

/* MAIN LAYOUT */
#main{display:flex;flex:1;overflow:hidden}

/* LEFT PANEL - texture browser */
#left{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#left-header{padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
#search{width:100%;padding:5px 8px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;outline:none}
#search:focus{border-color:var(--accent2)}
#cat-tabs{display:flex;flex-wrap:wrap;gap:3px;padding:6px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.cat-tab{padding:3px 7px;border-radius:3px;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:11px;transition:all .1s}
.cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cat-tab:hover:not(.active){background:var(--bg3)}
#texture-list{flex:1;overflow-y:auto;padding:4px}
#texture-list::-webkit-scrollbar{width:4px}
#texture-list::-webkit-scrollbar-track{background:transparent}
#texture-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.tex-item{display:flex;align-items:center;gap:8px;padding:5px 6px;border-radius:4px;cursor:pointer;border:1px solid transparent;transition:all .1s}
.tex-item:hover{background:var(--bg3);border-color:var(--border)}
.tex-item.active{background:var(--bg4);border-color:var(--accent);color:var(--accent2)}
.tex-thumb{width:28px;height:28px;image-rendering:pixelated;border-radius:3px;background:var(--bg3);flex-shrink:0;border:1px solid var(--border)}
.tex-name{font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text2)}
.tex-item.active .tex-name{color:var(--accent2)}
#tex-count{font-size:11px;color:var(--text2);padding:4px 8px;flex-shrink:0;border-top:1px solid var(--border)}

/* CENTER - canvas editor */
#center{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--canvas-bg)}
#editor-toolbar{display:flex;align-items:center;gap:6px;padding:6px 10px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.tool-btn{width:32px;height:32px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .1s;flex-shrink:0}
.tool-btn:hover{background:var(--bg4);border-color:var(--border2)}
.tool-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.tool-sep{width:1px;height:24px;background:var(--border);flex-shrink:0;margin:0 2px}
#zoom-label{font-size:11px;color:var(--text2);white-space:nowrap;min-width:36px;text-align:center}
#canvas-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
#canvas-bg-check{position:absolute;inset:0;background-image:linear-gradient(45deg,#2a2a3a 25%,transparent 25%),linear-gradient(-45deg,#2a2a3a 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#2a2a3a 75%),linear-gradient(-45deg,transparent 75%,#2a2a3a 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0px;pointer-events:none}
#main-canvas{image-rendering:pixelated;cursor:crosshair;position:relative;z-index:1;box-shadow:0 0 0 1px var(--border2)}
#overlay-canvas{position:absolute;image-rendering:pixelated;cursor:crosshair;z-index:2;pointer-events:none}
#no-texture{position:absolute;text-align:center;color:var(--text2)}
#no-texture p{font-size:14px;margin-bottom:6px}
#no-texture small{font-size:12px;color:var(--text3)}

/* RIGHT PANEL */
#right{width:200px;flex-shrink:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#right section{border-bottom:1px solid var(--border);padding:8px 10px;flex-shrink:0}
#right section h3{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}

/* Color picker */
#color-preview{width:100%;height:36px;border-radius:4px;border:1px solid var(--border);margin-bottom:6px;cursor:pointer;position:relative}
#color-hex{width:100%;padding:4px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;font-family:monospace;margin-bottom:6px}
#color-hex:focus{outline:none;border-color:var(--accent2)}
.slider-row{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.slider-row label{font-size:11px;color:var(--text2);width:12px}
.slider-row input[type=range]{flex:1;accent-color:var(--accent)}
.slider-row span{font-size:11px;color:var(--text2);width:24px;text-align:right}

/* Palette */
#palette-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px;margin-bottom:6px}
.pal-swatch{width:100%;aspect-ratio:1;border-radius:2px;cursor:pointer;border:1px solid transparent;transition:all .1s}
.pal-swatch:hover,.pal-swatch.active{border-color:var(--accent2);transform:scale(1.1)}
#add-pal-btn{width:100%;padding:4px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text2);cursor:pointer;font-size:11px}
#add-pal-btn:hover{background:var(--bg4)}

/* Pixel info */
#px-info{font-size:11px;color:var(--text2);line-height:1.8}
#px-info span{color:var(--text);font-family:monospace}

/* History */
#history-list{max-height:80px;overflow-y:auto;font-size:11px;color:var(--text2)}

/* Pack metadata panel */
#meta-panel{padding:8px 10px;overflow-y:auto;flex:1}
#meta-panel h3{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.meta-field{margin-bottom:8px}
.meta-field label{display:block;font-size:11px;color:var(--text2);margin-bottom:3px}
.meta-field input,.meta-field textarea{width:100%;padding:5px 7px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;outline:none;font-family:inherit}
.meta-field input:focus,.meta-field textarea:focus{border-color:var(--accent2)}
.meta-field textarea{resize:vertical;min-height:50px;font-size:11px}
#uuid-btn{width:100%;padding:4px;background:var(--bg3);border:1px solid var(--border);border-radius:3px;color:var(--text2);cursor:pointer;font-size:11px;margin-top:3px}
#uuid-btn:hover{background:var(--bg4)}

/* Status bar */
#statusbar{padding:3px 10px;background:var(--bg2);border-top:1px solid var(--border);font-size:11px;color:var(--text2);flex-shrink:0;display:flex;gap:12px}
#statusbar span{color:var(--text)}

/* Toast */
#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--bg3);border:1px solid var(--border2);border-radius:6px;padding:8px 16px;font-size:12px;opacity:0;transition:all .3s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Hidden file input */
#real-color-input{position:absolute;opacity:0;pointer-events:none;width:0;height:0}

/* Eye dropper cursor */
body.dropper-mode #main-canvas{cursor:crosshair!important}
body.dropper-mode #main-canvas::after{content:''}

/* Grid overlay toggle */
.grid-on #overlay-canvas{opacity:1}
.grid-off #overlay-canvas{opacity:0}
</style>
</head>
<body>

<div id="topbar">
  <h1>🟩 Bedrock Texture Editor <span>v1.26.20.4</span></h1>
  <div id="topbar-spacer"></div>
  <button class="topbtn" onclick="showMeta()">📦 Pack Info</button>
  <button class="topbtn" onclick="undoAction()" title="Undo (Ctrl+Z)">↩ Undo</button>
  <button class="topbtn" onclick="redoAction()" title="Redo (Ctrl+Y)">↪ Redo</button>
  <button class="topbtn" onclick="clearCanvas()" title="Clear to transparent">🗑 Clear</button>
  <button class="topbtn" onclick="importTexture()" title="Import PNG">📂 Import</button>
  <button class="topbtn success" onclick="exportMcpack()">📦 Export .mcpack</button>
  <input type="file" id="import-file" accept="image/png" style="display:none" onchange="loadImportedFile(event)">
</div>

<div id="main">
  <!-- LEFT: Texture browser -->
  <div id="left">
    <div id="left-header">
      <input id="search" type="text" placeholder="🔍 Search textures..." oninput="filterTextures()">
    </div>
    <div id="cat-tabs"></div>
    <div id="texture-list"></div>
    <div id="tex-count">Loading...</div>
  </div>

  <!-- CENTER: Canvas -->
  <div id="center">
    <div id="editor-toolbar">
      <button class="tool-btn active" id="tool-pencil" onclick="setTool('pencil')" title="Pencil (P)">✏️</button>
      <button class="tool-btn" id="tool-eraser" onclick="setTool('eraser')" title="Eraser (E)">⬜</button>
      <button class="tool-btn" id="tool-fill" onclick="setTool('fill')" title="Fill (F)">🪣</button>
      <button class="tool-btn" id="tool-dropper" onclick="setTool('dropper')" title="Eye Dropper (D)">🔍</button>
      <button class="tool-btn" id="tool-rect" onclick="setTool('rect')" title="Rectangle (R)">▭</button>
      <button class="tool-btn" id="tool-line" onclick="setTool('line')" title="Line (L)">╱</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" id="grid-btn" onclick="toggleGrid()" title="Toggle grid">⊞</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="changeZoom(-1)" title="Zoom out">−</button>
      <div id="zoom-label">8x</div>
      <button class="tool-btn" onclick="changeZoom(1)" title="Zoom in">+</button>
      <div class="tool-sep"></div>
      <button class="tool-btn" onclick="flipH()" title="Flip horizontal">↔</button>
      <button class="tool-btn" onclick="flipV()" title="Flip vertical">↕</button>
      <button class="tool-btn" onclick="rotCW()" title="Rotate 90° CW">↻</button>
    </div>
    <div id="canvas-wrap">
      <div id="canvas-bg-check"></div>
      <canvas id="main-canvas"></canvas>
      <canvas id="overlay-canvas"></canvas>
      <div id="no-texture"><p>← Select a texture to edit</p><small>or import a PNG file</small></div>
    </div>
  </div>

  <!-- RIGHT: Tools -->
  <div id="right">
    <section>
      <h3>Color</h3>
      <div id="color-preview" onclick="openColorPicker()"></div>
      <input id="color-hex" type="text" value="#FF5500" oninput="hexChanged()" placeholder="#RRGGBB">
      <input id="real-color-input" type="color" value="#ff5500" oninput="nativeColorChanged()">
      <div class="slider-row"><label>R</label><input type="range" id="sl-r" min="0" max="255" value="255" oninput="sliderChanged()"><span id="lbl-r">255</span></div>
      <div class="slider-row"><label>G</label><input type="range" id="sl-g" min="0" max="255" value="85" oninput="sliderChanged()"><span id="lbl-g">85</span></div>
      <div class="slider-row"><label>B</label><input type="range" id="sl-b" min="0" max="255" value="0" oninput="sliderChanged()"><span id="lbl-b">0</span></div>
      <div class="slider-row"><label>A</label><input type="range" id="sl-a" min="0" max="255" value="255" oninput="sliderChanged()"><span id="lbl-a">255</span></div>
    </section>

    <section>
      <h3>Palette</h3>
      <div id="palette-grid"></div>
      <button id="add-pal-btn" onclick="addToPalette()">+ Add current color</button>
    </section>

    <section>
      <h3>Brush</h3>
      <div class="slider-row">
        <label>Sz</label>
        <input type="range" id="brush-size" min="1" max="16" value="1" oninput="document.getElementById('lbl-brush').textContent=this.value">
        <span id="lbl-brush">1</span>
      </div>
    </section>

    <section>
      <h3>Pixel Info</h3>
      <div id="px-info">
        X: <span id="px-x">-</span> Y: <span id="px-y">-</span><br>
        RGBA: <span id="px-rgba">-</span><br>
        Hex: <span id="px-hex">-</span>
      </div>
    </section>

    <div id="meta-panel" style="display:none">
      <h3>Pack Metadata</h3>
      <div class="meta-field">
        <label>Pack Name</label>
        <input type="text" id="pack-name" value="My Texture Pack">
      </div>
      <div class="meta-field">
        <label>Description</label>
        <textarea id="pack-desc">A custom texture pack</textarea>
      </div>
      <div class="meta-field">
        <label>UUID (Header)</label>
        <input type="text" id="pack-uuid1" readonly style="font-size:10px;font-family:monospace">
        <button id="uuid-btn" onclick="regenUUIDs()">🔄 Regenerate UUIDs</button>
      </div>
      <div class="meta-field">
        <label>UUID (Module)</label>
        <input type="text" id="pack-uuid2" readonly style="font-size:10px;font-family:monospace">
      </div>
      <div class="meta-field">
        <label>Version</label>
        <input type="text" id="pack-version" value="1.0.0">
      </div>
    </div>
  </div>
</div>

<div id="statusbar">
  <span id="st-texture">No texture</span>
  &nbsp;|&nbsp;
  Size: <span id="st-size">-</span>
  &nbsp;|&nbsp;
  Tool: <span id="st-tool">Pencil</span>
  &nbsp;|&nbsp;
  Zoom: <span id="st-zoom">8x</span>
</div>

<div id="toast"></div>

// ═══════════════════════════════════════════════
// UUID
// ═══════════════════════════════════════════════
function genUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{
    const r=Math.random()*16|0,v=c==='x'?r:(r&0x3|0x8);
    return v.toString(16);
  });
}
let packUUID1 = genUUID(), packUUID2 = genUUID();

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
const mainCanvas = document.getElementById('main-canvas');
const overlayCanvas = document.getElementById('overlay-canvas');
const ctx = mainCanvas.getContext('2d');
const octx = overlayCanvas.getContext('2d');

function init() {
  buildCatTabs();
  setCategory('blocks');
  buildPalette();
  updateColorUI();
  document.getElementById('pack-uuid1').value = packUUID1;
  document.getElementById('pack-uuid2').value = packUUID2;
  document.addEventListener('keydown', onKeyDown);
}

// ═══════════════════════════════════════════════
// CATEGORY TABS
// ═══════════════════════════════════════════════
function buildCatTabs() {
  const tabs = document.getElementById('cat-tabs');
  const cats = ['blocks','items','entity','environment','particle','misc','colormap'];
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (c === currentCategory ? ' active' : '');
    btn.textContent = c;
    btn.onclick = () => setCategory(c);
    btn.id = 'cattab-' + c;
    tabs.appendChild(btn);
  });
}

function setCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
  const t = document.getElementById('cattab-' + cat);
  if (t) t.classList.add('active');
  document.getElementById('search').value = '';
  renderTextureList(MANIFEST[cat] || []);
}

function filterTextures() {
  const q = document.getElementById('search').value.toLowerCase();
  const all = MANIFEST[currentCategory] || [];
  const filtered = q ? all.filter(p => p.toLowerCase().includes(q)) : all;
  renderTextureList(filtered);
}

function renderTextureList(paths) {
  const list = document.getElementById('texture-list');
  list.innerHTML = '';
  document.getElementById('tex-count').textContent = paths.length + ' textures';
  paths.forEach(path => {
    const item = document.createElement('div');
    item.className = 'tex-item' + (path === currentTexturePath ? ' active' : '');
    item.dataset.path = path;
    const img = document.createElement('img');
    img.className = 'tex-thumb';
    img.src = 'textures/' + path;
    img.onerror = () => { img.style.opacity = '0.3'; img.src = ''; };
    const name = document.createElement('div');
    name.className = 'tex-name';
    const parts = path.split('/');
    name.textContent = parts[parts.length-1].replace('.png','');
    name.title = path;
    item.appendChild(img);
    item.appendChild(name);
    item.onclick = () => loadTexture(path);
    list.appendChild(item);
  });
}

// ═══════════════════════════════════════════════
// LOAD TEXTURE FROM SERVER
// ═══════════════════════════════════════════════
function loadTexture(path) {
  currentTexturePath = path;
  document.querySelectorAll('.tex-item').forEach(i => {
    i.classList.toggle('active', i.dataset.path === path);
  });
  document.getElementById('no-texture').style.display = 'none';
  document.getElementById('st-texture').textContent = path.split('/').pop().replace('.png','');

  // If we have a modified version, use that
  if (modifiedTextures[path]) {
    setCanvasFromImageData(modifiedTextures[path]);
    return;
  }

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = 'textures/' + path + '?t=' + Date.now();
  img.onload = () => {
    canvasW = img.naturalWidth;
    canvasH = img.naturalHeight;
    setupCanvases();
    ctx.clearRect(0,0,canvasW,canvasH);
    ctx.drawImage(img,0,0);
    pushUndo();
    document.getElementById('st-size').textContent = canvasW + '×' + canvasH;
    drawGrid();
  };
  img.onerror = () => {
    toast('⚠ Could not load texture. Is the textures/ folder next to this HTML file?', 4000);
  };
}

function setCanvasFromImageData(imageData) {
  canvasW = imageData.width;
  canvasH = imageData.height;
  setupCanvases();
  ctx.putImageData(imageData, 0, 0);
  document.getElementById('st-size').textContent = canvasW + '×' + canvasH;
  pushUndo();
  drawGrid();
}

function setupCanvases() {
  mainCanvas.width = canvasW;
  mainCanvas.height = canvasH;
  overlayCanvas.width = canvasW;
  overlayCanvas.height = canvasH;
  updateZoom();
}

// ═══════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════
function updateZoom() {
  mainCanvas.style.width = (canvasW * zoom) + 'px';
  mainCanvas.style.height = (canvasH * zoom) + 'px';
  overlayCanvas.style.width = (canvasW * zoom) + 'px';
  overlayCanvas.style.height = (canvasH * zoom) + 'px';
  // Position overlay on top of canvas
  const rect = mainCanvas.getBoundingClientRect();
  overlayCanvas.style.position = 'absolute';
  document.getElementById('zoom-label').textContent = zoom + 'x';
  document.getElementById('st-zoom').textContent = zoom + 'x';
  drawGrid();
}

function changeZoom(dir) {
  const levels = [1,2,4,6,8,12,16,24,32,48,64];
  const idx = levels.indexOf(zoom);
  const newIdx = Math.max(0, Math.min(levels.length-1, idx + dir));
  zoom = levels[newIdx];
  updateZoom();
}

// ═══════════════════════════════════════════════
// GRID
// ═══════════════════════════════════════════════
function toggleGrid() {
  gridOn = !gridOn;
  document.getElementById('grid-btn').classList.toggle('active', gridOn);
  drawGrid();
}

function drawGrid() {
  if (!canvasW) return;
  octx.clearRect(0,0,canvasW,canvasH);
  if (!gridOn || zoom < 4) return;
  octx.strokeStyle = 'rgba(255,255,255,0.12)';
  octx.lineWidth = 1/zoom;
  for (let x=0; x<=canvasW; x++) {
    octx.beginPath(); octx.moveTo(x,0); octx.lineTo(x,canvasH); octx.stroke();
  }
  for (let y=0; y<=canvasH; y++) {
    octx.beginPath(); octx.moveTo(0,y); octx.lineTo(canvasW,y); octx.stroke();
  }
}

// ═══════════════════════════════════════════════
// TOOLS
// ═══════════════════════════════════════════════
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn[id^=tool-]').forEach(b => b.classList.remove('active'));
  const btn = document.getElementById('tool-' + tool);
  if (btn) btn.classList.add('active');
  document.getElementById('st-tool').textContent = tool.charAt(0).toUpperCase()+tool.slice(1);
  mainCanvas.style.cursor = tool === 'dropper' ? 'crosshair' : 'crosshair';
}

function getCanvasPos(e) {
  const rect = mainCanvas.getBoundingClientRect();
  const x = Math.floor((e.clientX - rect.left) / zoom);
  const y = Math.floor((e.clientY - rect.top) / zoom);
  return {x, y};
}

function colorStr(c) {
  return `rgba(${c.r},${c.g},${c.b},${c.a/255})`;
}

function drawPixel(x, y) {
  if (x<0||y<0||x>=canvasW||y>=canvasH) return;
  const size = parseInt(document.getElementById('brush-size').value);
  ctx.fillStyle = currentTool === 'eraser' ? 'rgba(0,0,0,0)' : colorStr(currentColor);
  if (currentTool === 'eraser') {
    ctx.clearRect(x - Math.floor(size/2), y - Math.floor(size/2), size, size);
  } else {
    ctx.globalAlpha = currentColor.a/255;
    ctx.fillRect(x - Math.floor(size/2), y - Math.floor(size/2), size, size);
    ctx.globalAlpha = 1;
  }
}

function floodFill(px, py, fillColor) {
  const imageData = ctx.getImageData(0,0,canvasW,canvasH);
  const data = imageData.data;
  const idx = (py * canvasW + px) * 4;
  const tr = data[idx], tg = data[idx+1], tb = data[idx+2], ta = data[idx+3];
  const fr = fillColor.r, fg = fillColor.g, fb = fillColor.b, fa = fillColor.a;
  if (tr===fr&&tg===fg&&tb===fb&&ta===fa) return;
  const stack = [[px,py]];
  const visited = new Uint8Array(canvasW*canvasH);
  while (stack.length) {
    const [x,y] = stack.pop();
    if (x<0||y<0||x>=canvasW||y>=canvasH) continue;
    const i = y*canvasW+x;
    if (visited[i]) continue;
    const di = i*4;
    if (data[di]!==tr||data[di+1]!==tg||data[di+2]!==tb||data[di+3]!==ta) continue;
    visited[i]=1;
    data[di]=fr; data[di+1]=fg; data[di+2]=fb; data[di+3]=fa;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imageData,0,0);
}

function pickColor(x,y) {
  const d = ctx.getImageData(x,y,1,1).data;
  currentColor = {r:d[0],g:d[1],b:d[2],a:d[3]};
  updateColorUI();
  toast('Color picked: ' + rgbaToHex(currentColor));
  setTool('pencil');
}

// Line drawing helper
function drawLine(x0,y0,x1,y1) {
  const dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
  const sx=x0<x1?1:-1,sy=y0<y1?1:-1;
  let err=dx-dy;
  while(true){
    drawPixel(x0,y0);
    if(x0===x1&&y0===y1) break;
    const e2=2*err;
    if(e2>-dy){err-=dy;x0+=sx;}
    if(e2<dx){err+=dx;y0+=sy;}
  }
}

// ═══════════════════════════════════════════════
// MOUSE EVENTS
// ═══════════════════════════════════════════════
mainCanvas.addEventListener('mousedown', e => {
  if (!canvasW) return;
  const {x,y} = getCanvasPos(e);
  isDrawing = true;
  startPx = x; startPy = y;

  if (currentTool === 'dropper') { pickColor(x,y); isDrawing=false; return; }
  if (currentTool === 'fill') { pushUndo(); floodFill(x,y,currentColor); saveModified(); return; }
  if (currentTool === 'pencil' || currentTool === 'eraser') { pushUndo(); drawPixel(x,y); saveModified(); }
  if (currentTool === 'rect' || currentTool === 'line') {
    previewImageData = ctx.getImageData(0,0,canvasW,canvasH);
  }
});

mainCanvas.addEventListener('mousemove', e => {
  if (!canvasW) return;
  const {x,y} = getCanvasPos(e);
  updatePixelInfo(x,y);
  if (!isDrawing) return;

  if (currentTool === 'pencil' || currentTool === 'eraser') {
    drawPixel(x,y);
    saveModified();
  }
  if (currentTool === 'rect' && previewImageData) {
    ctx.putImageData(previewImageData,0,0);
    ctx.strokeStyle = colorStr(currentColor);
    ctx.lineWidth = 1;
    ctx.strokeRect(startPx+.5, startPy+.5, x-startPx, y-startPy);
  }
  if (currentTool === 'line' && previewImageData) {
    ctx.putImageData(previewImageData,0,0);
    ctx.strokeStyle = colorStr(currentColor);
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(startPx+.5,startPy+.5); ctx.lineTo(x+.5,y+.5); ctx.stroke();
  }
});

mainCanvas.addEventListener('mouseup', e => {
  if (!isDrawing) return;
  isDrawing = false;
  const {x,y} = getCanvasPos(e);
  if ((currentTool === 'rect' || currentTool === 'line') && previewImageData) {
    ctx.putImageData(previewImageData,0,0);
    pushUndo();
    if (currentTool === 'rect') {
      ctx.strokeStyle = colorStr(currentColor);
      ctx.lineWidth = 1;
      ctx.strokeRect(startPx+.5, startPy+.5, x-startPx, y-startPy);
    } else {
      drawLine(startPx,startPy,x,y);
    }
    previewImageData = null;
    saveModified();
  }
});

mainCanvas.addEventListener('mouseleave', () => {
  document.getElementById('px-x').textContent = '-';
  document.getElementById('px-y').textContent = '-';
  document.getElementById('px-rgba').textContent = '-';
  document.getElementById('px-hex').textContent = '-';
});

// Mouse wheel zoom
document.getElementById('canvas-wrap').addEventListener('wheel', e => {
  e.preventDefault();
  changeZoom(e.deltaY < 0 ? 1 : -1);
}, {passive:false});

// ═══════════════════════════════════════════════
// PIXEL INFO
// ═══════════════════════════════════════════════
function updatePixelInfo(x,y) {
  if (x<0||y<0||x>=canvasW||y>=canvasH) return;
  document.getElementById('px-x').textContent = x;
  document.getElementById('px-y').textContent = y;
  const d = ctx.getImageData(x,y,1,1).data;
  document.getElementById('px-rgba').textContent = `${d[0]},${d[1]},${d[2]},${d[3]}`;
  document.getElementById('px-hex').textContent = '#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase();
}

// ═══════════════════════════════════════════════
// COLOR
// ═══════════════════════════════════════════════
function rgbaToHex(c) {
  return '#'+[c.r,c.g,c.b].map(v=>v.toString(16).padStart(2,'0')).join('').toUpperCase();
}

function hexToRgb(hex) {
  hex = hex.replace('#','');
  if (hex.length===3) hex=hex.split('').map(c=>c+c).join('');
  const n = parseInt(hex,16);
  return {r:(n>>16)&255,g:(n>>8)&255,b:n&255};
}

function updateColorUI() {
  const hex = rgbaToHex(currentColor);
  const preview = document.getElementById('color-preview');
  preview.style.background = colorStr(currentColor);
  document.getElementById('color-hex').value = hex;
  document.getElementById('real-color-input').value = hex;
  document.getElementById('sl-r').value = currentColor.r; document.getElementById('lbl-r').textContent = currentColor.r;
  document.getElementById('sl-g').value = currentColor.g; document.getElementById('lbl-g').textContent = currentColor.g;
  document.getElementById('sl-b').value = currentColor.b; document.getElementById('lbl-b').textContent = currentColor.b;
  document.getElementById('sl-a').value = currentColor.a; document.getElementById('lbl-a').textContent = currentColor.a;
}

function openColorPicker() {
  document.getElementById('real-color-input').click();
}

function nativeColorChanged() {
  const hex = document.getElementById('real-color-input').value;
  const rgb = hexToRgb(hex);
  currentColor.r=rgb.r; currentColor.g=rgb.g; currentColor.b=rgb.b;
  updateColorUI();
}

function hexChanged() {
  const hex = document.getElementById('color-hex').value;
  if (!/^#[0-9a-fA-F]{6}$/.test(hex)) return;
  const rgb = hexToRgb(hex);
  currentColor.r=rgb.r; currentColor.g=rgb.g; currentColor.b=rgb.b;
  updateColorUI();
}

function sliderChanged() {
  currentColor.r = parseInt(document.getElementById('sl-r').value);
  currentColor.g = parseInt(document.getElementById('sl-g').value);
  currentColor.b = parseInt(document.getElementById('sl-b').value);
  currentColor.a = parseInt(document.getElementById('sl-a').value);
  document.getElementById('lbl-r').textContent = currentColor.r;
  document.getElementById('lbl-g').textContent = currentColor.g;
  document.getElementById('lbl-b').textContent = currentColor.b;
  document.getElementById('lbl-a').textContent = currentColor.a;
  updateColorUI();
}

// ═══════════════════════════════════════════════
// PALETTE
// ═══════════════════════════════════════════════
function buildPalette() {
  const grid = document.getElementById('palette-grid');
  grid.innerHTML = '';
  palette.forEach((hex, i) => {
    const sw = document.createElement('div');
    sw.className = 'pal-swatch';
    sw.style.background = hex;
    sw.title = hex;
    sw.onclick = () => {
      const rgb = hexToRgb(hex);
      currentColor.r=rgb.r; currentColor.g=rgb.g; currentColor.b=rgb.b;
      updateColorUI();
    };
    sw.oncontextmenu = e => {
      e.preventDefault();
      palette.splice(i,1);
      buildPalette();
    };
    grid.appendChild(sw);
  });
}

function addToPalette() {
  const hex = rgbaToHex(currentColor);
  if (!palette.includes(hex)) { palette.push(hex); buildPalette(); }
}

// ═══════════════════════════════════════════════
// UNDO/REDO
// ═══════════════════════════════════════════════
function pushUndo() {
  if (!canvasW) return;
  undoStack.push(ctx.getImageData(0,0,canvasW,canvasH));
  if (undoStack.length > 50) undoStack.shift();
  redoStack = [];
}

function undoAction() {
  if (undoStack.length < 2) return;
  redoStack.push(undoStack.pop());
  ctx.putImageData(undoStack[undoStack.length-1],0,0);
  saveModified();
}

function redoAction() {
  if (!redoStack.length) return;
  const state = redoStack.pop();
  undoStack.push(state);
  ctx.putImageData(state,0,0);
  saveModified();
}

// ═══════════════════════════════════════════════
// TRANSFORMS
// ═══════════════════════════════════════════════
function flipH() {
  if (!canvasW) return;
  pushUndo();
  const tmp = document.createElement('canvas');
  tmp.width=canvasW; tmp.height=canvasH;
  const tc = tmp.getContext('2d');
  tc.translate(canvasW,0); tc.scale(-1,1);
  tc.drawImage(mainCanvas,0,0);
  ctx.clearRect(0,0,canvasW,canvasH);
  ctx.drawImage(tmp,0,0);
  saveModified();
}

function flipV() {
  if (!canvasW) return;
  pushUndo();
  const tmp = document.createElement('canvas');
  tmp.width=canvasW; tmp.height=canvasH;
  const tc = tmp.getContext('2d');
  tc.translate(0,canvasH); tc.scale(1,-1);
  tc.drawImage(mainCanvas,0,0);
  ctx.clearRect(0,0,canvasW,canvasH);
  ctx.drawImage(tmp,0,0);
  saveModified();
}

function rotCW() {
  if (!canvasW) return;
  pushUndo();
  const tmp = document.createElement('canvas');
  tmp.width=canvasH; tmp.height=canvasW;
  const tc = tmp.getContext('2d');
  tc.translate(canvasH,0); tc.rotate(Math.PI/2);
  tc.drawImage(mainCanvas,0,0);
  canvasW=tmp.width; canvasH=tmp.height;
  mainCanvas.width=canvasW; mainCanvas.height=canvasH;
  overlayCanvas.width=canvasW; overlayCanvas.height=canvasH;
  ctx.drawImage(tmp,0,0);
  document.getElementById('st-size').textContent = canvasW + '×' + canvasH;
  updateZoom();
  saveModified();
}

// ═══════════════════════════════════════════════
// CLEAR
// ═══════════════════════════════════════════════
function clearCanvas() {
  if (!canvasW) return;
  pushUndo();
  ctx.clearRect(0,0,canvasW,canvasH);
  saveModified();
}

// ═══════════════════════════════════════════════
// SAVE MODIFIED STATE
// ═══════════════════════════════════════════════
function saveModified() {
  if (!currentTexturePath || !canvasW) return;
  modifiedTextures[currentTexturePath] = ctx.getImageData(0,0,canvasW,canvasH);
}

// ═══════════════════════════════════════════════
// IMPORT
// ═══════════════════════════════════════════════
function importTexture() {
  document.getElementById('import-file').click();
}

function loadImportedFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      canvasW=img.naturalWidth; canvasH=img.naturalHeight;
      setupCanvases();
      ctx.clearRect(0,0,canvasW,canvasH);
      ctx.drawImage(img,0,0);
      document.getElementById('no-texture').style.display = 'none';
      document.getElementById('st-texture').textContent = file.name;
      document.getElementById('st-size').textContent = canvasW+'×'+canvasH;
      pushUndo();
      drawGrid();
      if (!currentTexturePath) currentTexturePath = 'custom/' + file.name;
      saveModified();
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

// ═══════════════════════════════════════════════
// EXPORT .mcpack (ZIP with JSZip)
// ═══════════════════════════════════════════════
function exportMcpack() {
  if (!canvasW) { toast('⚠ No texture loaded to export'); return; }

  const name = document.getElementById('pack-name').value || 'MyTexturePack';
  const desc = document.getElementById('pack-desc').value || 'A texture pack';
  const version = document.getElementById('pack-version').value || '1.0.0';
  const ver = version.split('.').map(Number);

  const manifest = {
    format_version: 2,
    header: {
      name, description: desc,
      uuid: packUUID1,
      version: ver,
      min_engine_version: [1,16,0]
    },
    modules: [{
      type: 'resources',
      uuid: packUUID2,
      version: ver
    }]
  };

  // Load JSZip
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
  script.onload = () => doExport(manifest, name);
  document.head.appendChild(script);
}

function doExport(manifest, packName) {
  const zip = new JSZip();
  zip.file('manifest.json', JSON.stringify(manifest, null, 2));

  // Pack icon
  const iconCanvas = document.createElement('canvas');
  iconCanvas.width = 64; iconCanvas.height = 64;
  const ic = iconCanvas.getContext('2d');
  ic.imageSmoothingEnabled = false;
  if (canvasW > 0) ic.drawImage(mainCanvas,0,0,64,64);
  else { ic.fillStyle='#7c3aed'; ic.fillRect(0,0,64,64); }

  const pending = [];

  // Add icon
  pending.push(new Promise(res => {
    iconCanvas.toBlob(blob => {
      zip.file('pack_icon.png', blob);
      res();
    }, 'image/png');
  }));

  // Add all modified textures
  for (const [path, imageData] of Object.entries(modifiedTextures)) {
    pending.push(new Promise(res => {
      const tc = document.createElement('canvas');
      tc.width = imageData.width; tc.height = imageData.height;
      tc.getContext('2d').putImageData(imageData, 0, 0);
      tc.toBlob(blob => {
        zip.file('textures/' + path, blob);
        res();
      }, 'image/png');
    }));
  }

  Promise.all(pending).then(() => {
    zip.generateAsync({type:'blob'}).then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = packName.replace(/[^a-zA-Z0-9_-]/g,'_') + '.mcpack';
      a.click();
      toast('✅ Exported ' + Object.keys(modifiedTextures).length + ' texture(s) as .mcpack!', 3000);
    });
  });
}

// ═══════════════════════════════════════════════
// PACK META
// ═══════════════════════════════════════════════
let metaVisible = false;
function showMeta() {
  metaVisible = !metaVisible;
  document.getElementById('meta-panel').style.display = metaVisible ? 'block' : 'none';
  document.querySelector('[onclick="showMeta()"]').classList.toggle('active', metaVisible);
}

function regenUUIDs() {
  packUUID1 = genUUID(); packUUID2 = genUUID();
  document.getElementById('pack-uuid1').value = packUUID1;
  document.getElementById('pack-uuid2').value = packUUID2;
  toast('🔄 New UUIDs generated');
}

// ═══════════════════════════════════════════════
// KEYBOARD SHORTCUTS
// ═══════════════════════════════════════════════
function onKeyDown(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undoAction(); }
  if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redoAction(); }
  if (!e.ctrlKey) {
    if (e.key === 'p' || e.key === 'P') setTool('pencil');
    if (e.key === 'e' || e.key === 'E') setTool('eraser');
    if (e.key === 'f' || e.key === 'F') setTool('fill');
    if (e.key === 'd' || e.key === 'D') setTool('dropper');
    if (e.key === 'r' || e.key === 'R') setTool('rect');
    if (e.key === 'l' || e.key === 'L') setTool('line');
    if (e.key === 'g' || e.key === 'G') toggleGrid();
    if (e.key === '+' || e.key === '=') changeZoom(1);
    if (e.key === '-') changeZoom(-1);
  }
}

// ═══════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════
let toastTimer;
function toast(msg, dur=2000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), dur);
}

// ═══════════════════════════════════════════════
// START
// ═══════════════════════════════════════════════
init();
</script>
